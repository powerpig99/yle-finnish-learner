name: Build and Release Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v6.2.2)'
        required: true
        type: string

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Resolve release metadata
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi

          VERSION="${TAG#v}"

          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"

          if [ "$MANIFEST_VERSION" != "$RELEASE_VERSION" ]; then
            echo "Tag version $RELEASE_VERSION does not match manifest version $MANIFEST_VERSION" >&2
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Package extension
        run: |
          chmod +x package_project.sh
          ./package_project.sh

      - name: Create release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_VERSION }}
          files: yle-dual-sub-extension_${{ env.RELEASE_VERSION }}.zip
